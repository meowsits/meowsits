<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meowsits | mindful moments</title>
  <style>
    /* Color Palette & Base Styles */
    :root {
      --bg-color: #F4F1EA; 
      --line-color: #5A5A5A; 
      --matcha-accent: #8F9779; 
      --blossom-accent: #C1A5A9; 
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: var(--bg-color);
      color: var(--line-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer; 
      user-select: none;
    }

    /* Minimalist Header */
    h1 {
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 5px;
      color: var(--matcha-accent);
    }

    /* The New Organic Bonsai Tree Container */
    .zen-tree-container {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .zen-tree {
      width: 100%;
      height: 100%;
      color: var(--line-color);
    }

    /* The breathing blossoms */
    .blossoms {
      transform-origin: center;
      /* 8-second synchronized breathing growth */
      animation: blossomBreathe 8s infinite ease-in-out;
      transition: transform 0.6s ease-out, opacity 0.6s ease-out;
    }

    @keyframes blossomBreathe {
      0%, 100% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; } /* Peak inhale */
    }

    /* Container for Cat sitting on Text */
    .guide-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    /* Smaller, repositioned cat */
    .cat-sitting-small {
      width: 80px; 
      height: 80px;
      color: var(--line-color);
      margin-bottom: -10px; 
      /* Gentle idle sway for the cat */
      animation: gentleSway 8s infinite ease-in-out;
    }

    @keyframes gentleSway {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Typography for instructions and quotes */
    .instructions {
      font-size: 0.9rem;
      letter-spacing: 1px;
      opacity: 0.6;
      text-align: center;
      margin: 0;
      line-height: 1.5;
    }

    .quote-box {
      margin-top: 25px;
      padding: 0 20px;
      max-width: 500px;
      text-align: center;
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.5;
      height: 60px;
      opacity: 0.9;
      transition: opacity 0.6s ease;
    }
  </style>
</head>
<body id="mainInteractive" title="Tap anywhere to nurture your perspective">

  <h1>meowsits.</h1>

  <div class="zen-tree-container">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="zen-tree">
      
      <path d="M 100 200 C 110 160, 70 130, 95 100 C 110 80, 130 90, 140 60" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
      
      <path d="M 90 115 C 65 125, 45 110, 25 115" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      
      <path d="M 115 85 C 140 75, 165 85, 185 70" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      
      <path d="M 105 90 C 85 80, 75 90, 55 75" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

      <path d="M 130 75 C 145 60, 155 65, 165 50" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      
      <g class="blossoms" fill="var(--blossom-accent)" id="treeBlossoms">
        <circle cx="25" cy="115" r="7"/>
        <circle cx="15" cy="110" r="4"/>
        <circle cx="35" cy="105" r="5"/>
        <circle cx="45" cy="115" r="6"/>

        <circle cx="185" cy="70" r="7"/>
        <circle cx="195" cy="65" r="4"/>
        <circle cx="175" cy="60" r="5"/>
        <circle cx="165" cy="80" r="6"/>

        <circle cx="55" cy="75" r="6"/>
        <circle cx="45" cy="70" r="4"/>
        <circle cx="65" cy="65" r="5"/>

        <circle cx="140" cy="60" r="8"/>
        <circle cx="130" cy="50" r="5"/>
        <circle cx="150" cy="55" r="4"/>
        <circle cx="165" cy="50" r="6"/>
        <circle cx="175" cy="45" r="3"/>
      </g>
    </svg>
  </div>

  <div class="guide-section">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="cat-sitting-small">
      <circle cx="100" cy="70" r="35" fill="none" stroke="currentColor" stroke-width="3"/>
      <path d="M 72 48 L 65 15 L 90 40 M 128 48 L 135 15 L 110 40" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
      <path d="M 80 68 Q 88 75 95 68 M 105 68 Q 112 75 120 68" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 98 80 L 102 80 L 100 83 Z" fill="currentColor"/>
      <path d="M 100 83 Q 95 88 90 85 M 100 83 Q 105 88 110 85" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M 60 70 L 40 65 M 60 75 L 35 75 M 60 80 L 40 85 M 140 70 L 160 65 M 140 75 L 165 75 M 140 80 L 160 85" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M 80 102 C 50 115 35 155 50 165 C 65 175 135 175 150 165 C 165 155 150 115 120 102" fill="none" stroke="currentColor" stroke-width="3"/>
      <path d="M 75 100 L 100 135 L 125 100 M 90 120 L 110 145" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <path d="M 85 102 C 75 130 95 145 100 145 C 105 145 125 130 115 102" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <path d="M 100 145 Q 90 165 100 175 Q 110 165 100 145" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4"/>
      <path d="M 100 175 L 97 185 M 100 175 L 100 187 M 100 175 L 103 185" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <ellipse cx="100" cy="172" rx="60" ry="8" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
    </svg>
    
    <div class="instructions">Match your breath to the growing blossoms.<br>Tap anywhere for guidance.</div>
  </div>
  
  <div class="quote-box" id="quoteDisplay">"The peaceful observer misses nothing."</div>

  <script>
    const quotes = [
      "Breathe in the calm, exhale the hairballs.",
      "Find your sunbeam and rest deeply within it.",
      "Notice the stillness that exists between the purrs.",
      "Like a seedling reaching for the light, your mindfulness grows.",
      "You are a quiet garden. Tend to yourself with patience.",
      "Even the fiercest tiger must pause to wash its paws.",
      "Let your worries drift away like a laser pointer on the wall.",
      "Stretch your body fully, then let everything go.",
      "You do not need to catch every mouse you see.",
      "The peaceful observer misses nothing."
    ];

    const mainInteractive = document.getElementById('mainInteractive');
    const treeBlossoms = document.getElementById('treeBlossoms');
    const quoteDisplay = document.getElementById('quoteDisplay');

    // Clicking anywhere on the screen triggers the interaction
    mainInteractive.addEventListener('click', () => {
      // Temporarily pause the breathing and "flash" scale the blossoms
      treeBlossoms.style.animation = 'none';
      treeBlossoms.style.transform = 'scale(1.3)';
      treeBlossoms.style.opacity = '1';
      
      // Resume the slow breathing cycle after a moment
      setTimeout(() => {
          treeBlossoms.style.animation = 'blossomBreathe 8s infinite ease-in-out';
      }, 600);

      // Change the Quote
      quoteDisplay.style.opacity = 0;
      
      setTimeout(() => {
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        quoteDisplay.textContent = `"${randomQuote}"`;
        quoteDisplay.style.opacity = 0.9;
      }, 600); 
    });
  </script>

</body>
</html>
