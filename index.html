<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meowsits | mindful mist</title>
    <style>
        :root {
            --mist-deep: #cfd8d2;
            --mist-light: #f4f1ea;
            --text-color: #555;
            --accent: #8F9779;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: var(--mist-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }

        /* Animated Surreal Background */
        .mist-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--mist-light), var(--mist-deep));
            background-size: 200% 200%;
            animation: driftMist 20s infinite alternate ease-in-out;
            z-index: -2;
            transition: opacity 0.5s ease;
        }

        @keyframes driftMist {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* Subtle Glow behind the cat */
        .cat-aura {
            position: absolute;
            width: 300px;
            height: 300px;
            background: white;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Audio Toggle (Upper Left) */
        .audio-toggle {
            position: fixed;
            top: 30px; 
            left: 30px;
            z-index: 100;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .audio-toggle:hover {
            opacity: 1;
        }

        /* Visual Menu Hint (Upper Right) */
        .menu-btn {
            position: fixed;
            top: 30px; 
            right: 30px;
            z-index: 80; /* Sits below the sliding menu so it gets covered gracefully */
            cursor: pointer;
            padding: 10px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .menu-btn:hover {
            opacity: 1;
        }

        .bar { 
            width: 25px; 
            height: 2px; 
            background: var(--text-color); 
            margin: 5px 0; 
            border-radius: 2px;
        }

        /* The Interactive Menu (Right side) */
        .side-nav {
            position: fixed;
            top: 0; right: -300px;
            width: 280px; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            z-index: 90; /* Higher than the menu button */
            display: flex;
            flex-direction: column;
            padding: 100px 40px;
            transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.02);
        }
        
        .side-nav.active { right: 0; }
        
        .side-nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1.1rem;
            margin: 15px 0;
            letter-spacing: 2px;
            transition: 0.3s ease;
            opacity: 0.6;
        }
        
        .side-nav a:hover { color: var(--accent); opacity: 1; padding-left: 4px; }

        /* Central Stage */
        .stage {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .main-cat {
            width: 240px;
            height: auto;
            mix-blend-mode: multiply;
            z-index: 10;
            animation: floatMain 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes floatMain {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Text Elements */
        .ui-overlay {
            margin-top: 40px;
            text-align: center;
        }

        h1 { font-weight: 200; letter-spacing: 12px; margin-bottom: 20px; font-size: 2rem; opacity: 0.8; }
        
        .quote-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote { 
            font-style: italic; 
            opacity: 0; 
            max-width: 400px; 
            line-height: 1.6;
            transition: opacity 1.5s ease-in-out;
        }
        
        .quote.visible { opacity: 0.6; }

    </style>
</head>
<body>

    <div class="mist-bg" id="mistBg"></div>

    <audio id="purrAudio" loop>
        <source src="purr.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-toggle" id="audioBtn">
        <span id="audioIcon">🔇</span> purr
    </div>

    <div class="menu-btn" id="menuBtn">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <nav class="side-nav" id="sideNav">
        <a href="#">Home</a>
        <a href="#">Artstuff</a>
        <a href="#">Reflections</a>
        <a href="#">Contact</a>
    </nav>

    <div class="stage">
        <div class="cat-aura" id="aura"></div>
        <img src="zen_cat_lineart.png" alt="Zen Cat" class="main-cat" id="zenCat">
        
        <div class="ui-overlay">
            <h1>meowsits</h1>
            <div class="quote-container">
                <p class="quote" id="quoteText">"The mist arrives without a sound."</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Audio Toggle Logic
        const audioBtn = document.getElementById('audioBtn');
        const audioIcon = document.getElementById('audioIcon');
        const purrAudio = document.getElementById('purrAudio');
        let isPlaying = false;

        audioBtn.addEventListener('click', () => {
            if (isPlaying) {
                purrAudio.pause();
                audioIcon.innerText = '🔇';
            } else {
                purrAudio.play();
                audioIcon.innerText = '🔊';
            }
            isPlaying = !isPlaying;
        });

        // 2. Hover-Triggered Menu (with Click Fallback)
        const sideNav = document.getElementById('sideNav');
        const menuBtn = document.getElementById('menuBtn');
        
        // Open on hover near the right edge
        document.addEventListener('mousemove', (e) => {
            if (e.clientX > window.innerWidth - 60) {
                sideNav.classList.add('active');
            }
            if (e.clientX < window.innerWidth - 320) {
                sideNav.classList.remove('active');
            }
        });

        // Open on explicit click (great for mobile/tablets)
        menuBtn.addEventListener('click', () => {
            sideNav.classList.add('active');
        });

        // Close menu on mobile if clicking outside
        document.addEventListener('click', (e) => {
            if (!sideNav.contains(e.target) && !menuBtn.contains(e.target) && sideNav.classList.contains('active')) {
                sideNav.classList.remove('active');
            }
        });

        // 3. Proximity Interaction (Aura & Mist)
        const aura = document.getElementById('aura');
        const zenCat = document.getElementById('zenCat');

        document.addEventListener('mousemove', (e) => {
            const rect = zenCat.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const distance = Math.sqrt(
                Math.pow(e.clientX - centerX, 2) + Math.pow(e.clientY - centerY, 2)
            );

            // Aura expands and brightens as you get closer
            const intensity = Math.max(0.2, 1 - (distance / 600));
            aura.style.opacity = intensity * 0.6;
            aura.style.transform = `scale(${1 + intensity * 0.5})`;
        });

        // 4. Auto-Cycling Quotes
        const quotes = [
            "In the stillness, the purr becomes the universe.",
            "Don't seek the sun; become the sunbeam.",
            "The center is wherever you sit.",
            "A cat does not chase the fog; it waits for the sun.",
            "Your breath is the only bridge you need.",
            "The mountain does not move for the wind.",
            "Just sitting, doing nothing, the grass grows by itself.",
            "Wash your paws, then wash your mind.",
            "The empty bowl is already full.",
            "Chasing the laser is not catching the laser.",
            "Sleep when tired, eat when hungry, purr when content.",
            "Listen to the sound of one paw batting.",
            "To understand the mouse, one must not be the cat, but the silence.",
            "No mind, just meow."
        ];

        let quoteIndex = 0;
        const quoteText = document.getElementById('quoteText');

        function rotateQuotes() {
            quoteText.classList.remove('visible');
            setTimeout(() => {
                quoteIndex = (quoteIndex + 1) % quotes.length;
                quoteText.innerText = `"${quotes[quoteIndex]}"`;
                quoteText.classList.add('visible');
            }, 1500); 
        }

        // Initialize Quotes
        quoteText.classList.add('visible');
        setInterval(rotateQuotes, 8000);

    </script>
</body>
</html>
