<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meowsits | mindful growth</title>
  <style>
    /* Color Palette & Base Styles */
    :root {
      --bg-color: #F4F1EA; /* Warm Linen */
      --line-color: #5A5A5A; /* Soft Dark Gray */
      --matcha-accent: #8F9779; /* Soft Matcha Green */
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: var(--bg-color);
      color: var(--line-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Minimalist Header */
    h1 {
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 20px;
      color: var(--matcha-accent);
    }

    /* The Main Interactive Container */
    .zen-growth-container {
      position: relative;
      width: 350px;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    /* 1. The Code-Drawn Cat (SVG) */
    .cat-meditating {
      position: absolute;
      width: 180px; 
      height: 180px;
      z-index: 10;
      color: var(--line-color); /* SVG uses this color for the strokes */
      /* Breathing animation applied to the cat itself */
      animation: breatheCat 8s infinite ease-in-out;
    }

    /* 2. The Growing/Blossoming Tree Layer */
    .tree-blossom-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      /* Code-drawn minimalist tree branches */
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50,85 C40,60 15,50 15,30 A5,5 0 0,1 25,30 C25,50 45,60 50,75 C55,60 75,50 75,30 A5,5 0 0,1 85,30 C85,50 60,60 50,85 Z" stroke="%238F9779" stroke-width="1" fill="none"/></svg>');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.2; 
      transform: scale(0.8);
      z-index: 5;
      /* Growth/Blossom animation synchronized with breath */
      animation: bloomTree 8s infinite ease-in-out;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* Interactive state for the tree layer */
    .zen-growth-container:hover .tree-blossom-layer {
      opacity: 0.5;
    }

    /* Keyframes for Cat Breathing (gentle scale/pulse) */
    @keyframes breatheCat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); opacity: 0.9; }
    }

    /* Keyframes for Tree Blooming (synchronized growth) */
    @keyframes bloomTree {
      0%, 100% { transform: scale(0.8); opacity: 0.2; }
      50% { transform: scale(1.1); opacity: 0.8; } /* Peak inhale, maximum bloom */
    }

    /* Growth/Bloom Flash Animation for Click */
    @keyframes bloomFlash {
      0% { transform: scale(1.1); opacity: 0.8; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1.1); opacity: 0.8; }
    }

    /* Typography for instructions and quotes */
    .instructions {
      margin-top: 30px;
      font-size: 0.9rem;
      letter-spacing: 1px;
      opacity: 0.6;
      text-align: center;
    }

    .quote-box {
      margin-top: 20px;
      padding: 0 20px;
      max-width: 500px;
      text-align: center;
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.5;
      height: 60px;
      opacity: 0.9;
      transition: opacity 0.6s ease;
    }

  </style>
</head>
<body>

  <h1>meowsits.</h1>

  <div class="zen-growth-container" id="mainInteractive" title="Tap to nurture your perspective">
    <div class="tree-blossom-layer" id="treeLayer"></div>
    
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="cat-meditating" id="zenCatImage">
      <circle cx="100" cy="70" r="35" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <path d="M 72 48 L 65 15 L 90 40 M 128 48 L 135 15 L 110 40" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M 80 68 Q 88 75 95 68 M 105 68 Q 112 75 120 68" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M 98 80 L 102 80 L 100 83 Z" fill="currentColor"/>
      <path d="M 100 83 Q 95 88 90 85 M 100 83 Q 105 88 110 85" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 60 70 L 40 65 M 60 75 L 35 75 M 60 80 L 40 85 M 140 70 L 160 65 M 140 75 L 165 75 M 140 80 L 160 85" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 80 102 C 50 115 35 155 50 165 C 65 175 135 175 150 165 C 165 155 150 115 120 102" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <path d="M 75 100 L 100 135 L 125 100 M 90 120 L 110 145" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M 85 102 C 75 130 95 145 100 145 C 105 145 125 130 115 102" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M 100 145 Q 90 165 100 175 Q 110 165 100 145" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 3"/>
      <path d="M 100 175 L 97 185 M 100 175 L 100 187 M 100 175 L 103 185" fill="none" stroke="currentColor" stroke-width="1"/>
      <ellipse cx="100" cy="170" rx="60" ry="8" fill="none" stroke="var(--matcha-accent)" stroke-width="1" opacity="0.5"/>
      <ellipse cx="100" cy="172" rx="80" ry="12" fill="none" stroke="var(--matcha-accent)" stroke-width="0.5" opacity="0.3"/>
    </svg>
  </div>

  <div class="instructions">Match your breath to the growing blossoms.<br>Tap the cat for guidance.</div>
  
  <div class="quote-box" id="quoteDisplay">"The peaceful observer misses nothing."</div>

  <script>
    const quotes = [
      "Breathe in the calm, exhale the hairballs.",
      "Find your sunbeam and rest deeply within it.",
      "Notice the stillness that exists between the purrs.",
      "Like a seedling reaching for the light, your mindfulness grows.",
      "You are a quiet garden. Tend to yourself with patience.",
      "Even the fiercest tiger must pause to wash its paws.",
      "Let your worries drift away like a laser pointer on the wall.",
      "Stretch your body fully, then let everything go.",
      "You do not need to catch every mouse you see.",
      "The peaceful observer misses nothing."
    ];

    const mainContainer = document.getElementById('mainInteractive');
    const treeLayer = document.getElementById('treeLayer');
    const quoteDisplay = document.getElementById('quoteDisplay');

    // Interactive event listener
    mainContainer.addEventListener('click', () => {
      // 1. Trigger the Blossom Flash interaction
      treeLayer.style.animation = 'bloomFlash 0.6s ease-out';
      
      setTimeout(() => {
          treeLayer.style.animation = 'bloomTree 8s infinite ease-in-out';
      }, 600);

      // 2. Change the Quote interaction
      quoteDisplay.style.opacity = 0;
      
      setTimeout(() => {
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        quoteDisplay.textContent = `"${randomQuote}"`;
        quoteDisplay.style.opacity = 0.9;
      }, 600); 
    });
  </script>

</body>
</html>
